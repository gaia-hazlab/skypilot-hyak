[workspace]
authors = ["Scott Henderson <3924836+scottyhq@users.noreply.github.com>"]
channels = ["conda-forge"]
name = "skypilot-hyak"
platforms = ["osx-arm64", "linux-64"]
version = "0.1.0"

[tasks]
check = "sky check slurm"
status = "sky status"
test-klone = "sky launch templates/klone-cpu.yaml"
test-tillicum = "sky launch templates/tillicum-test.yaml"

[dependencies]
python = ">=3.14.4,<3.15"

[pypi-options]
prerelease-mode = "allow"

[pypi-dependencies]
# Need master branch for Hyak compatibility
#skypilot = { version = ">=0.12.2, <0.13", extras = ["slurm", "aws"] }
skypilot = { git = "https://github.com/skypilot-org/skypilot.git", rev="ef5e805baa85eb168f4420622dedcad32cb545a4", extras = ["slurm", "aws"]}

