resources:
  # Available partitions: ['compute', 'ckpt', 'ckpt-all', 'ckpt-g2', 'compute-bigmem', 'compute-hugemem', 'compute-ultramem', 'cpu-g2', 'cpu-g2-mem2x', 'gpu-2080ti', 'gpu-a100', 'gpu-a40', 'gpu-h200', 'gpu-l40', 'gpu-l40s', 'gpu-p100', 'gpu-rtx6k']
  # by default tries ordered list of partitions if unspecified - so 'compute'
  infra: slurm/klone/ckpt
  # eScience partitions:
  #infra: slurm/klone/cpu-g2 # CPU=32, RAM=238G
  #infra: slurm/klone/cpu-g2-mem2x # CPU=32, RAM=490G
  #infra: slurm/klone/gpu-rtx6k # CPU=10, RAM=81G, GPU=2x RTX 6000
  #infra: slurm/klone/gpu-a40 # CPU=52, RAM=994G, GPU=8x A40
  # Simple resource request for testing:
  # By default uses vCPU=2 and RAM=2GB, but can specify more here!
  #memory: 8
  #cpus: 4

config:
  slurm:
    sbatch_options:
      account: escience
      time: "1:00:00"

# Check resources
setup: |
  pwd
  ls
  df -h
  free -h
  # check if ~/.bashrc sourced correctly
  echo $SCRATCH
  which pixi

run: |
  echo $SCRATCH
  which pixi
  echo "Hello from skypilot on Klone!"
