# https://docs.skypilot.co/en/stable/reference/yaml-spec.html#syntax
resources:
  infra: aws/us-west-2
  memory: 16+
  cpus: 4+
  #accelerators: T4:1
  #disk_size: 512
  #ephemeral_storage: 50
  #use_spot: true
  # disk_size: 128
  # Automatically *stop* the cluster after being idle for N minutes (don't delete)
  autostop:
    idle_minutes: 10
    down: false
    wait_for: jobs_and_ssh

#envs:
 #MY_BUCKET: skypilot-temp-gcs-test

# Sync code from GitHub repo to VM ./nisar-examples -> ./sky_workdir
# workdir:
#   url: https://github.com/huskysar/nisar-examples.git
#   ref: main
# Use ssh key to avoid being prompted for credentials on remote machine
workdir:
  url: git@github.com:huskysar/nisar-examples.git
  ref: main

file_mounts:
  # Format: <cluster path>: <local path/cloud object URI>
  # Upload from local machine to the cluster via rsync.
  /tmp/datasets/opera: ~/Data/opera
  #~/.vimrc: ~/.vimrc
  #~/.ssh/id_rsa.pub: ~/.ssh/id_rsa.pub

  # Download from S3 to the cluster (note not 2-way sync & no trailing slash on s3 "folder"!)
  # NOTE: does not use --no-sign-request so needs AWS credentials on remote server
  #/tmp/datasets/cresst: s3://cresst/scratch/scott


# Setup Pixi for Venv management
setup: |
  curl -fsSL https://pixi.sh/install.sh | sh
  source ~/.bashrc
  pixi --version

  # Copy from public bucket
  aws --no-sign-request s3 sync s3://cresst/scratch/scott/ /tmp/datasets/cresst

  # Automatically set certain environment variables for remote shells
  echo 'export GDAL_DISABLE_READDIR_ON_OPEN="EMPTY_DIR"' >> ~/.bashrc

  # requires EARTHDATA_TOKEN to be set in secrets.env and passed with `--env-file secrets.env` during launch
  echo 'export EARTHDATA_TOKEN="${EARTHDATA_TOKEN}"' >> ~/.bashrc

run: |
  echo "Hello, AWS!"
